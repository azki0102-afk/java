<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARADOX DRIFT</title>

<link rel="icon" href="./logoparadox-removebg-preview.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Orbitron",sans-serif}
body{background:#0b0b0b;color:#fff;overflow-x:hidden;padding-bottom:80px}

/* ambient */
body::before{
content:"";position:fixed;inset:0;
background:radial-gradient(circle at 30% 20%,rgba(255,46,46,.08),transparent 60%);
animation:ambient 12s linear infinite;
pointer-events:none;z-index:-1}
@keyframes ambient{50%{filter:hue-rotate(10deg)}}

/* loader */
#loader{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000}
#loader h1{color:#ff2e2e;letter-spacing:4px}
#loader span{margin-top:15px;width:140px;height:4px;background:#222;overflow:hidden}
#loader span::after{content:"";display:block;height:100%;width:40%;background:#ff2e2e;animation:load 1s infinite}
@keyframes load{from{transform:translateX(-100%)}to{transform:translateX(250%)}}

/* navbar */
nav{background:#111;display:flex;justify-content:space-between;align-items:center;padding:15px 50px;position:sticky;top:0;z-index:1000}
.logo-img{width:50px;filter:drop-shadow(0 0 10px #ff2e2e)}
.nav-links{list-style:none;display:flex;gap:25px}
.nav-links a{color:#fff;text-decoration:none}
.nav-links a:hover{color:#ff2e2e}

/* hero */
.hero{text-align:center;padding:70px 20px}
.hero h1{color:#ff2e2e;font-size:42px;letter-spacing:4px}
.hero img{width:380px;margin:25px 0;filter:drop-shadow(0 0 30px #ff2e2e);animation:float 4s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-12px)}}

/* sketch */
.drift-gallery img,
.hero img,
.blind img{
filter: grayscale(100%) contrast(130%) brightness(.85);
}

/* gallery */
.gallery-wrap{padding:60px 10px}
.filter{display:flex;justify-content:center;gap:14px;margin-bottom:25px}
.filter button{background:#111;color:#fff;border:1px solid #333;padding:8px 18px;cursor:pointer}
.filter button:hover{border-color:#ff2e2e;color:#ff2e2e}

.drift-gallery{display:flex;gap:26px;overflow-x:auto;scroll-snap-type:x mandatory;scrollbar-width:none}
.drift-gallery::-webkit-scrollbar{display:none}
.drift-gallery img{
width:220px;border-radius:16px;cursor:pointer;
scroll-snap-align:center;transition:.4s;
filter:brightness(.75)
}
.drift-gallery img:hover{
transform:scale(1.15);
box-shadow:0 0 40px #ff2e2e
}

/* blind */
.blind{
display:flex;
justify-content:center;
align-items:center;
padding:120px 20px;
background:#000;
border-top:1px solid #1a1a1a;
border-bottom:1px solid #1a1a1a;
gap: 40px;
}

.blind img{
width:220px;
border-radius:20px;
cursor:pointer;
transition:0.5s ease;
}

/* CLICK SCALE */
.click-zoom{
animation:clickZoom .35s ease forwards;
position:relative;
z-index:2000;
}

@keyframes clickZoom{
0%{transform:scale(1)}
100%{transform:scale(1.35)}
}

/* GLITCH */
.glitch{
animation:glitchFlash .3s ease;
}

@keyframes glitchFlash{
0%{filter:drop-shadow(0 0 0 red)}
25%{filter:drop-shadow(6px 0 0 red)}
50%{filter:drop-shadow(-6px 0 0 #ff2e2e)}
75%{filter:drop-shadow(4px 0 0 red)}
100%{filter:drop-shadow(0 0 0 red)}
}

/* modal */
#imgModal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:10000
}
#imgModal img{
max-width:90%;
max-height:90%;
border:3px solid #ff2e2e;
border-radius:14px;
box-shadow:0 0 40px #ff2e2e
}
.nav-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:60px;
color:#ff2e2e;
cursor:pointer;
padding:20px
}
.nav-btn.left{left:20px}
.nav-btn.right{right:20px}
#imgTitle{
position:absolute;
bottom:40px;
font-size:18px;
letter-spacing:2px
}
</style>
</head>

<body>

<div id="loader"><h1>PARADOX DRIFT</h1><span></span></div>

<nav>
<img src="./ChatGPT_Image_Jan_29__2026__09_54_54_AM-removebg-preview.png" class="logo-img">
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Cars</a></li>
<li><a href="#">Gallery</a></li>
<li><a href="#">About</a></li>
</ul>
</nav>

<section class="hero">
<h1>PARADOX DRIFT</h1>
<img src="./ChatGPT_Image_Jan_29__2026__09_54_54_AM-removebg-preview.png">
<p>Konsep modifikasi ekstrem. Anti normal. Anti arus.</p>
</section>

<section class="gallery-wrap">
<div class="drift-gallery">
<img src="./parad15.png">
<img src="./miata parad.jpeg">
<img src="./mieclipese parada.png">
<img src="./gtrparad.jpeg">
<img src="./rxparad.jpeg">
<img src="./r8parad.png">
<img src="./180parad.png">
<img src="./rxsvpd.png" alt="">
<img src="./aeparad.png">
<img src="./s2000parad.png">
<img src="./f40parad.png">
<img src="./r8parad.png">
<img src="./porshe 911parad.png">
<img src="./revuelto.png">
<img src="./sfparad.png">
</div>
</section>

<div class="blind">
<img src="./jacket.png">
<img src="./wolfparad.png">
<img src="./blindparad.png">
<img src="./gtrparad.jpeg">
</div>

<div id="imgModal">
<div class="nav-btn left">&#10094;</div>
<img id="modalImg">
<div class="nav-btn right">&#10095;</div>
<div id="imgTitle"></div>
</div>

<script>
const loader=document.getElementById("loader");
window.onload=()=>setTimeout(()=>loader.style.display="none",1200);

const imgs=[...document.querySelectorAll(".drift-gallery img, .blind img")];

const modal=document.getElementById("imgModal");
const modalImg=document.getElementById("modalImg");
const title=document.getElementById("imgTitle");
const left=document.querySelector(".left");
const right=document.querySelector(".right");

let i=0;

function show(n){
if(n<0)n=imgs.length-1;
if(n>=imgs.length)n=0;
i=n;
modalImg.src=imgs[i].src;
title.textContent=imgs[i].src.split("/").pop();
}

imgs.forEach((img,idx)=>{
img.addEventListener("click",function(){
img.classList.add("click-zoom");
setTimeout(()=>{img.classList.add("glitch");},150);
setTimeout(()=>{
img.classList.remove("click-zoom");
img.classList.remove("glitch");
modal.style.display="flex";
show(idx);
},400);
});
});

left.onclick=e=>{e.stopPropagation();show(i-1)};
right.onclick=e=>{e.stopPropagation();show(i+1)};
modal.onclick=e=>{if(e.target===modal)modal.style.display="none"};
</script>

</body>
</html>
